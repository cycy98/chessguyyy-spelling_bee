[project]
name = "spellingbee"
version = "0.0.1"
description = "Unfinished alpha."
requires-python = ">=3.13"
dependencies = [
    "aiosqlite3>=0.3.0",
    "fastapi[standard]>=0.135.3",
    "jinja2>=3.1.6",
    "python-multipart>=0.0.26",
    "sse-starlette>=3.3.4",
]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
# Require explicit selection of preview rules.
explicit-preview-rules = true
select = ["ALL"]
extend-select = ["ALL"]
extend-safe-fixes = ["ALL"]
extend-ignore = ["D", "N", "ANN"]
preview = true
