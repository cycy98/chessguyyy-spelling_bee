{# Leaderboard fragment #}
<div>
    <div class="section-header">
        <h2>{{ players | length }} tracked players.</h2>
        <button class="outline secondary" hx-get="/" hx-target="#content" hx-swap="innerHTML">Main Menu</button>
    </div>

    {% if players | length > 0 %}
    <figure>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Player</th>
                    <th>ELO</th>
                    <th>Games</th>
                    <th>Wins (%)</th>
                    <th>Correct (%)</th>
                    <th>Best WPM</th>
                </tr>
            </thead>
            <tbody>
                {% for p in players %}
                <tr style="border-left:3px solid {{ p.username | name_color }}">
                    <td>{{ loop.index }}</td>
                    <td>
                        <a href="#" style="font-weight:600"
                            hx-get="account/{{ p.username }}" hx-target="#content" hx-swap="innerHTML">
                            {{ p.username }}
                        </a>
                    </td>
                    <td>{{ p.elo | round(1) }}</td>
                    <td>{{ p.games }}</td>
                    <td>{{ ((p.wins / p.games * 100) if p.games > 0 else 0) | round(1) }}%</td>
                    <td>{{ ((p.correct / p.words * 100) if p.words > 0 else 0) | round(1) }}%</td>
                    <td title="{{ p.best_word }}">{{ p.best_wpm }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </figure>
    {% else %}
    <p class="text-center" style="padding:40px"><small>No players yet. Register and play to appear here!</small></p>
    {% endif %}
</div>
