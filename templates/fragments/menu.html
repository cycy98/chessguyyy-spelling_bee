{# Auth + setup fragment — returned after login/logout/register #}
{% if user %}
<div id="auth-section" class="auth-logged-in">
    <span class="auth-info">{{ user }} | {{ elo | round(1) }} ELO</span>
    <button class="btn secondary" hx-post="/logout" hx-target="#auth-section" hx-swap="outerHTML">Logout</button>
</div>
<input type="hidden" id="logged-in-username" value="{{ user }}" />
{% else %}
<div id="auth-section" class="auth-form">
    <input type="text" name="username" placeholder="Username" maxlength="24" class="input" id="auth-username" />
    <input type="password" name="password" placeholder="Password" maxlength="128" class="input" id="auth-password" />
    <div class="auth-buttons">
        <button class="btn primary" hx-post="/register" hx-target="#auth-section" hx-swap="outerHTML"
            hx-include="#auth-username, #auth-password">Register</button>
        <button class="btn secondary" hx-post="/login" hx-target="#auth-section" hx-swap="outerHTML"
            hx-include="#auth-username, #auth-password">Login</button>
    </div>
    <div id="auth-feedback">{% if auth_error %}<p class="feedback error">{{ auth_error }}</p>{% endif %}</div>
</div>
<input type="hidden" id="logged-in-username" value="" />
{% endif %}
