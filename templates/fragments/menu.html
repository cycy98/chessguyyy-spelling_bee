{# Auth + setup fragment — returned after login/logout/register #}
{% if user %}
<div id="auth-section" class="bar glass" style="padding:16px;margin-bottom:20px">
    <span class="auth-info">{{ user }} | {{ elo | round(1) }} ELO</span>
    <button class="secondary small" hx-post="logout" hx-target="#auth-section" hx-swap="outerHTML">Logout</button>
</div>
<input type="hidden" id="logged-in-username" value="{{ user }}" />
{% else %}
<form id="auth-section" class="glass" style="padding:16px; margin-bottom:20px" hx-target="this" hx-swap="outerHTML" @submit.prevent>
    <label for="auth-username">Username</label>
    <input type="text" name="username" minlength="3" maxlength="24" id="auth-username" autocomplete="username" />
    <label for="auth-password">Password</label>
    <input type="password" name="password" minlength="8" maxlength="128" id="auth-password" autocomplete="current-password" />
    <div role="group">
        <button hx-post="register" hx-include="#auth-username, #auth-password">Register</button>
        <button class="secondary" hx-post="login" hx-include="#auth-username, #auth-password">Login</button>
    </div>
    <div id="auth-feedback">{% if auth_error %}<p class="feedback error">{{ auth_error }}</p>{% endif %}</div>
</form>
<input type="hidden" id="logged-in-username" value="" />
{% endif %}
