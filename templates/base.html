<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Bee</title>
    <base href="{{ request.scope.get('root_path', '').rstrip('/') }}/">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.1.1/css/pico.amber.min.css">
    <link rel="stylesheet" href="static/styles.css">
    <script src="https://unpkg.com/htmx.org@2.0.8"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.3/sse.js"></script>
    <script src="https://unpkg.com/idiomorph@0.7.4/dist/idiomorph-ext.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leo-profanity@1.9.0/lib/leo-profanity.min.js" async></script>
    <script defer src="https://unpkg.com/alpinejs@3.15.11/dist/cdn.min.js"></script>
</head>
<body>
    <div x-data="spellingBee()" class="app" hx-ext="morph">
        {% block content %}{% endblock %}
    </div>
    <script>
    /* aria-busy loading indicators on HTMX buttons (Pico renders a spinner) */
    document.addEventListener('htmx:beforeRequest', (e) => {
        if (e.detail.elt.tagName === 'BUTTON') e.detail.elt.setAttribute('aria-busy', 'true');
    });
    document.addEventListener('htmx:afterRequest', (e) => {
        if (e.detail.elt.tagName === 'BUTTON') e.detail.elt.removeAttribute('aria-busy');
    });

    /* Profanity filter — gate HTMX requests that carry user-entered names */
    document.addEventListener('htmx:configRequest', (e) => {
        const check = window.LeoProfanity?.check;
        if (!check) return;
        const params = e.detail.parameters;
        const fields = [
            ['username', 'username'], ['player_name', 'player name'], ['message', 'message'],
        ];
        for (const [key, label] of fields) {
            if (params[key] && check.call(window.LeoProfanity, params[key])) {
                e.preventDefault();
                const app = Alpine.$data(document.querySelector('[x-data]'));
                if (app) { app.profanityError = `Please choose a different ${label}.`; }
                return;
            }
        }
    });

    function spellingBee() {
        return {
            view: 'menu',
            mode: null,
            roomCode: null,
            playerName: '',
            difficulty: '{{ difficulties[0] }}',
            roomCodeInput: '',
            localPlayers: ['', ''],
            audioObj: null,
            audioPlayedUrl: '',
            inputLocked: false,
            nameTracksLogin: true,
            loggedInUser: '',

            volume: 1,
            muted: false,
            profanityError: '',

            // Persisted across room updates (room.html swaps via SSE-triggered GET,
            // which would wipe these if they lived in room.html's local x-data)
            guessText: '',
            chatMsg: '',
            sideTab: 'players',

            init() {
                const v = document.getElementById('logged-in-username')?.value;
                this.loggedInUser = v || '';
                if (v && this.nameTracksLogin) this.playerName = v;
                // Reconnect to active room on page refresh
                const rc = document.getElementById('reconnect-room');
                if (rc) {
                    this.roomCode = rc.value;
                    this.mode = rc.dataset.mode;
                    this.view = 'game';
                    htmx.ajax('GET', `room/${rc.value}`, {target: '#game-area', swap: 'innerHTML'});
                }
                window.addEventListener('beforeunload', () => {
                    if (this.roomCode) navigator.sendBeacon('forfeit');
                });
            },

            navigated(targetId, newView, newMode) {
                return (event) => {
                    if (!event.detail.successful || event.detail.target?.id !== targetId) return;
                    const el = document.querySelector('[data-room-code]');
                    if (el) this.roomCode = el.dataset.roomCode;
                    if (newMode) this.mode = newMode;
                    this.view = newView;
                };
            },

            addLocalPlayer() {
                if (this.localPlayers.length < 12) this.localPlayers.push('');
            },

            removeLocalPlayer() {
                if (this.localPlayers.length > 2) this.localPlayers.pop();
            },

            playAudio(url, lock) {
                if (!url) {
                    this.inputLocked = false;
                    return;
                }
                if (this.audioObj) {
                    this.audioObj.pause();
                    this.audioObj = null;
                }
                this.audioPlayedUrl = url;
                this.audioObj = new Audio(url);
                this.audioObj.volume = this.muted ? 0 : this.volume;
                if (lock) {
                    this.inputLocked = true;
                    let unlocked = false;
                    const unlock = () => {
                        if (!unlocked) { unlocked = true; this.inputLocked = false; }
                    };
                    this.audioObj.addEventListener('ended', unlock);
                    this.audioObj.addEventListener('error', unlock);
                    setTimeout(unlock, 1000);
                }
                this.audioObj.play().catch(() => { this.inputLocked = false; });
            },

            replayAudio() {
                const url = document.querySelector('[data-audio-url]');
                if (url && url.dataset.audioUrl) {
                    this.playAudio(url.dataset.audioUrl, false);
                }
            },

            submitGuess(text) {
                if (this.inputLocked) return;
                this.guessText = '';
                htmx.ajax('POST', 'guess', {
                    target: '#game-area',
                    swap: 'innerHTML',
                    values: { guess: text || '' }
                });
            },

            sendChat(roomCode) {
                if (!this.chatMsg.trim()) return;
                if (this.checkProfanity(this.chatMsg, 'message')) return;
                htmx.ajax('POST', `room/${roomCode}/chat`, {
                    values: { message: this.chatMsg },
                    swap: 'none'
                });
                this.chatMsg = '';
            },

            mainMenu() {
                if (this.roomCode) {
                    navigator.sendBeacon('forfeit');
                }
                this.roomCode = null;
                this.mode = null;
                this.view = 'menu';
            },

            hasProfanity(text) {
                return window.LeoProfanity?.check?.(text) ?? false;
            },

            checkProfanity(text, field) {
                if (this.hasProfanity(text)) {
                    this.profanityError = `Please choose a different ${field}.`;
                    return true;
                }
                this.profanityError = '';
                return false;
            },
        }
    }
    </script>
</body>
</html>
